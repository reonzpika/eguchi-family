<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ミッション作成 | Digital Engawa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#5c6060",
              "secondary-dim": "#005d60",
              "on-background": "#2f3334",
              "primary-dim": "#1f6000",
              "on-tertiary": "#fff8f2",
              "error": "#aa371c",
              "on-secondary-container": "#005d60",
              "surface-container-highest": "#e0e3e4",
              "on-error": "#fff7f6",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#573800",
              "on-error-container": "#671200",
              "tertiary-container": "#f9b854",
              "surface-tint": "#246e00",
              "inverse-primary": "#96f46e",
              "primary": "#246e00",
              "surface-bright": "#f9f9f9",
              "secondary": "#006a6d",
              "on-tertiary-fixed-variant": "#634000",
              "secondary-fixed-dim": "#67eaef",
              "surface-container-low": "#f3f4f4",
              "on-primary-container": "#1c5b00",
              "surface": "#f9f9f9",
              "primary-fixed": "#96f46e",
              "primary-fixed-dim": "#89e561",
              "on-tertiary-fixed": "#3c2500",
              "on-primary-fixed-variant": "#216500",
              "tertiary-dim": "#724b00",
              "on-surface": "#2f3334",
              "outline-variant": "#afb2b3",
              "surface-container-high": "#e6e8e9",
              "inverse-surface": "#0c0f0f",
              "surface-variant": "#e0e3e4",
              "primary-container": "#96f46e",
              "on-secondary-fixed-variant": "#00686b",
              "inverse-on-surface": "#9c9d9d",
              "error-dim": "#821a01",
              "secondary-fixed": "#77f9fe",
              "on-primary": "#ecffdc",
              "error-container": "#fa7150",
              "background": "#f9f9f9",
              "tertiary-fixed": "#f9b854",
              "surface-dim": "#d7dbdb",
              "surface-container": "#eceeee",
              "on-secondary": "#e2feff",
              "tertiary-fixed-dim": "#eaaa48",
              "tertiary": "#825600",
              "secondary-container": "#77f9fe",
              "outline": "#777b7c",
              "on-secondary-fixed": "#00494b",
              "on-primary-fixed": "#144500"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "Noto Sans JP"],
              "body": ["Be Vietnam Pro", "Noto Sans JP"],
              "label": ["Be Vietnam Pro", "Noto Sans JP"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Be Vietnam Pro', 'Noto Sans JP', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .primary-gradient {
        background: linear-gradient(135deg, #246e00 0%, #96f46e 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center px-8 h-16 bg-[#f9f9f9] dark:bg-neutral-900">
<div class="flex items-center gap-4 w-full">
<button class="material-symbols-outlined text-[#246e00] dark:text-[#96f46e] active:scale-95 transition-transform duration-200" data-icon="arrow_back">arrow_back</button>
<h1 class="font-['Plus_Jakarta_Sans','Noto_Sans_JP'] font-bold text-lg text-on-surface">ミッション作成</h1>
</div>
</header>
<main class="pt-20 px-8 max-w-2xl mx-auto space-y-8">
<!-- Intro Hero Section -->
<section class="relative overflow-hidden rounded-xl bg-primary-container/30 p-8 space-y-2">
<div class="absolute -right-4 -top-4 opacity-10">
<span class="material-symbols-outlined text-[120px]" data-icon="auto_awesome">auto_awesome</span>
</div>
<h2 class="font-headline font-bold text-2xl text-on-primary-container">新しい冒険を作る</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">AIと一緒に成長するためのミッションを設定しましょう。家族が楽しく取り組める内容がおすすめです。</p>
</section>
<!-- Form Sections -->
<div class="space-y-6">
<!-- Mission Name -->
<div class="space-y-3">
<label class="font-headline font-bold text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="edit_note">edit_note</span>
                    ミッション名
                </label>
<input class="w-full bg-surface-container-low border-none rounded-DEFAULT px-6 py-4 focus:ring-2 focus:ring-primary/40 placeholder:text-outline-variant text-on-surface transition-all" placeholder="例：AIで描く未来の動物図鑑" type="text"/>
</div>
<!-- Tool Selection -->
<div class="space-y-3">
<label class="font-headline font-bold text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="build">build</span>
                    使用ツールの選択
                </label>
<div class="grid grid-cols-1 gap-3">
<select class="w-full bg-surface-container-low border-none rounded-DEFAULT px-6 py-4 appearance-none focus:ring-2 focus:ring-primary/40 text-on-surface">
<option>ChatGPT (対話型AI)</option>
<option>Claude (高度な文章作成)</option>
<option>Midjourney (画像生成)</option>
<option>Stable Diffusion (画像生成)</option>
</select>
</div>
</div>
<!-- Steps Section -->
<div class="space-y-4">
<div class="flex justify-between items-center">
<label class="font-headline font-bold text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="format_list_numbered">format_list_numbered</span>
                        ミッションの手順
                    </label>
</div>
<div class="space-y-3">
<div class="flex gap-4 items-start bg-surface-container-lowest p-4 rounded-DEFAULT shadow-[0px_12px_32px_rgba(47,51,52,0.06)] group">
<span class="bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0 text-sm mt-1">1</span>
<input class="flex-grow bg-transparent border-none focus:ring-0 p-0 text-on-surface" placeholder="最初に行うことを入力" type="text"/>
<button class="text-outline-variant hover:text-error opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<div class="flex gap-4 items-start bg-surface-container-lowest p-4 rounded-DEFAULT shadow-[0px_12px_32px_rgba(47,51,52,0.06)] group">
<span class="bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0 text-sm mt-1">2</span>
<input class="flex-grow bg-transparent border-none focus:ring-0 p-0 text-on-surface" placeholder="次のステップを入力" type="text"/>
<button class="text-outline-variant hover:text-error opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<button class="w-full flex items-center justify-center gap-2 py-4 border-2 border-dashed border-outline-variant rounded-DEFAULT text-on-surface-variant hover:border-primary hover:text-primary transition-colors font-medium">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                        手順を追加する
                    </button>
</div>
</div>
<!-- Prompt Section -->
<div class="space-y-3">
<label class="font-headline font-bold text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="terminal">terminal</span>
                    AIへの指示 (プロンプト)
                </label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none rounded-DEFAULT px-6 py-4 focus:ring-2 focus:ring-primary/40 placeholder:text-outline-variant text-on-surface leading-relaxed" placeholder="AIへの具体的な命令を入力してください..." rows="6"></textarea>
<div class="absolute bottom-4 right-4 text-[10px] text-outline-variant font-medium">COPY READY</div>
</div>
</div>
<!-- Completion Criteria -->
<div class="space-y-4">
<label class="font-headline font-bold text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="stars">stars</span>
                    完成のサイン (チェックリスト)
                </label>
<div class="bg-tertiary-container/10 p-6 rounded-xl space-y-4 border border-tertiary-container/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="check_circle">check_circle</span>
<input class="flex-grow bg-transparent border-b border-tertiary-container/30 border-t-0 border-x-0 focus:ring-0 focus:border-tertiary p-0 text-on-surface placeholder:text-outline-variant/60" placeholder="例：画像を1枚以上保存した" type="text"/>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="check_circle">check_circle</span>
<input class="flex-grow bg-transparent border-b border-tertiary-container/30 border-t-0 border-x-0 focus:ring-0 focus:border-tertiary p-0 text-on-surface placeholder:text-outline-variant/60" placeholder="例：家族に感想を伝えた" type="text"/>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-6 pb-12">
<button class="w-full primary-gradient text-[#ecffdc] font-headline font-bold py-5 rounded-full shadow-[0px_12px_32px_rgba(36,110,0,0.15)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
                    ミッションを保存
                </button>
<button class="w-full mt-4 text-on-surface-variant font-medium py-3 hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
                    下書きとして保存
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-6 pt-3 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-md shadow-[0px_-12px_32px_rgba(47,51,52,0.06)] rounded-t-[3rem]">
<a class="flex flex-col items-center justify-center text-[#2f3334] dark:text-neutral-400 px-4 py-1 hover:opacity-80 active:scale-98 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Be_Vietnam_Pro','Noto_Sans_JP'] text-[10px] font-medium">ホーム</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#96f46e] dark:bg-[#246e00] text-[#246e00] dark:text-[#96f46e] rounded-[1rem] px-4 py-1 active:scale-98 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-['Be_Vietnam_Pro','Noto_Sans_JP'] text-[10px] font-medium">ミッション</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2f3334] dark:text-neutral-400 px-4 py-1 hover:opacity-80 active:scale-98 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-['Be_Vietnam_Pro','Noto_Sans_JP'] text-[10px] font-medium">分析</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2f3334] dark:text-neutral-400 px-4 py-1 hover:opacity-80 active:scale-98 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Be_Vietnam_Pro','Noto_Sans_JP'] text-[10px] font-medium">設定</span>
</a>
</nav>
</body></html>
